server:
  port: 8888

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        # Route 1: Identity Service
        - id: identity-service
          uri: http://localhost:8080
          predicates:
            - Path=/identity/**
          filters:
            - StripPrefix=1
            - name: AddRequestHeader
              args:
                name: X-Gateway-Request
                value: true

        # Route 2: Health check (tùy chọn)
        - id: gateway-health
          uri: http://localhost:8888
          predicates:
            - Path=/actuator/health

# Logging để debug routing
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
    org.springframework.web: DEBUG

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true