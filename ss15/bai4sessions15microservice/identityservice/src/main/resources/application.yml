server:
  port: 8082

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:h2:mem:identitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: c2VjcmV0LWtleS1mb3Itand0LWF1dGhlbnRpY2F0aW9uLXNlcnZpY2UtdGVzdC1rZXktZm9yLXJvdGF0aW9uCg==
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

logging:
  level:
    com.example: DEBUG