server:
  port: 8080

spring:
  application:
    name: identity-service

  datasource:
    url: jdbc:postgresql://localhost:5432/identity_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
    show-sql: true

app:
  jwt:
    secret: "vS6R5vH8N2zB4xR9mQ3pL1wT7yC5vH8N2zB4xR9mQ3pL1wI7yC5vH8N2z"
    access-token-expiration: 900000 # 15 mins
    refresh-token-expiration: 604800000 # 7 days

logging:
  level:
    com.example.identity: DEBUG
    org.springframework.security: DEBUG