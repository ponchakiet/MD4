server:
  port: 8888

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://localhost:8080
          predicates:
            - Path=/identity/**
          filters:
            - StripPrefix=1
        - id: product-service-mock
          uri: http://localhost:8080
          predicates:
            - Path=/product/**
          filters:
            - StripPrefix=1

